spring:
  application:
    name: campus-qa-backend
  datasource:
    url: jdbc:mysql://localhost:3306/campus_qa?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 1800000
      idle-timeout: 600000
  data:
    redis:
      host: localhost
      port: 6380
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8081

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  admin:
    username: admin
    password: 123456
    token-ttl-hours: 8
  audit:
    sensitive-words: 诈骗,色情,赌博,毒品,暴力,恐怖,辱骂
  embedding:
    enabled: true
    provider: openai
    base-url: https://api.siliconflow.cn
    api-key: ${EMBEDDING_API_KEY:}
    model: BAAI/bge-m3
    semantic-top-n: 20
    candidate-limit: 100
    connect-timeout-seconds: 5
    request-timeout-seconds: 8
  ai-answer:
    enabled: true
    base-url: https://api.siliconflow.cn
    api-key: ${AI_CHAT_API_KEY:${EMBEDDING_API_KEY:}}
    model: Qwen/Qwen2.5-7B-Instruct
    max-references: 3
